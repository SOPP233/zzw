services:
  mysql:
    image: mysql:8.4
    container_name: lw-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_123456
      MYSQL_DATABASE: lw_db
      MYSQL_USER: lw_user
      MYSQL_PASSWORD: lw_pass_123
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:

